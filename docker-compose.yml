version: "3"

services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  frontend:
    build: ./frontend
    container_name: react-ai
    ports:
      - "3000:3000"
    depends_on:
      - ollama

volumes:
  ollama: